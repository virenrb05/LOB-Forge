# @package _global_

predictor:
  model: dual_attention  # dual_attention | deeplob | linear
  d_model: 64
  n_heads: 4
  n_spatial_layers: 2
  n_temporal_layers: 2
  feedforward_dim: 128
  dropout: 0.1
  n_levels: 10
  n_classes: 3
  focal_loss_gamma: 2.0
  vpin_head: true
  vpin_loss_weight: 0.1
  optimizer:
    lr: 1.0e-4
    weight_decay: 1.0e-5
  scheduler:
    max_lr: 1.0e-3
    pct_start: 0.1
